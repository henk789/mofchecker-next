# Build platform wheels + sdist and publish to PyPI on a version tag.
#
# Publishing uses PyPI Trusted Publishing (OIDC) -- no API token is stored.
# One-time setup on pypi.org -> the project -> Publishing -> add a trusted
# publisher: owner=henk789, repo=mofchecker-rs, workflow=release.yml,
# environment=pypi. Then release with:  git tag v0.1.0 && git push origin v0.1.0
#
# abi3 (pyo3/abi3-py310) means one wheel per platform covers Python 3.10+.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:   # manual run builds wheels but does not publish (no tag)

permissions:
  contents: read

jobs:
  wheels:
    name: wheels ${{ matrix.platform.runner }} ${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-22.04,   target: x86_64,  manylinux: auto }
          - { runner: ubuntu-22.04,   target: aarch64, manylinux: auto }
          - { runner: macos-13,       target: x86_64 }
          - { runner: macos-14,       target: aarch64 }
          - { runner: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: ${{ matrix.platform.manylinux || '' }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist

  publish:
    name: publish to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs: [wheels, sdist]
    runs-on: ubuntu-22.04
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
